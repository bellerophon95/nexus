name: AWS EC2 Deployment

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff Format Check
        run: ruff format --check backend/

      - name: Run Ruff Lint Check
        run: ruff check backend/

  deploy:
    name: Build and Deploy to EC2
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Backend image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/nexus-backend:latest -f Dockerfile .
          docker push $ECR_REGISTRY/nexus-backend:latest

      - name: Build, tag, and push Frontend image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          DOMAIN_NAME: ${{ secrets.DOMAIN_NAME || 'project-nexus.duckdns.org' }}
        run: |
          cd frontend
          docker build --build-arg NEXT_PUBLIC_API_URL=https://$DOMAIN_NAME -t $ECR_REGISTRY/nexus-frontend:latest .
          docker push $ECR_REGISTRY/nexus-frontend:latest
          cd ..

      - name: Deploy to EC2 via SSM
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          DOMAIN_NAME: ${{ secrets.DOMAIN_NAME || 'project-nexus.duckdns.org' }}
          CADDY_EMAIL: ${{ secrets.CADDY_EMAIL }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
        run: |
          # Generate base64 encoded versions of our config files
          DC_B64=$(base64 -w 0 docker-compose.prod.yml)
          CF_B64=$(base64 -w 0 Caddyfile)
          
          # Prepare .env content for SSM
          ENV_CONTENT="AWS_REGISTRY=$ECR_REGISTRY
          DOMAIN_NAME=$DOMAIN_NAME
          CADDY_EMAIL=$CADDY_EMAIL
          AWS_ACCOUNT_ID=$AWS_ACCOUNT_ID
          AWS_REGION=$AWS_REGION
          SUPABASE_URL=$SUPABASE_URL
          SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
          SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY
          OPENAI_API_KEY=$OPENAI_API_KEY
          ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY
          QDRANT_URL=$QDRANT_URL
          QDRANT_API_KEY=$QDRANT_API_KEY
          UPSTASH_REDIS_REST_URL=$UPSTASH_REDIS_REST_URL
          UPSTASH_REDIS_REST_TOKEN=$UPSTASH_REDIS_REST_TOKEN
          LANGFUSE_PUBLIC_KEY=$LANGFUSE_PUBLIC_KEY
          LANGFUSE_SECRET_KEY=$LANGFUSE_SECRET_KEY
          LANGFUSE_HOST=$LANGFUSE_HOST"
          
          ENV_B64=$(echo "$ENV_CONTENT" | base64 -w 0)
          
          # Use SSM to write these files and run docker-compose
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              \"mkdir -p /home/ubuntu/nexus && cd /home/ubuntu/nexus\",
              \"echo $DC_B64 | base64 -d > docker-compose.prod.yml\",
              \"echo $CF_B64 | base64 -d > Caddyfile\",
              \"echo $ENV_B64 | base64 -d > .env\",
              \"aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY\",
              \"docker-compose -f docker-compose.prod.yml pull\",
              \"docker-compose -f docker-compose.prod.yml up -d --force-recreate\",
              \"docker system prune -af\",
              \"docker volume prune -f\"
            ]" \
            --region ${{ secrets.AWS_REGION }}
