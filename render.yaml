envVarGroups:
  - name: nexus-secrets
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: LANGFUSE_PUBLIC_KEY
        sync: false
      - key: LANGFUSE_SECRET_KEY
        sync: false
      - key: LANGFUSE_HOST
        value: https://cloud.langfuse.com
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ENV
        value: production
      - key: LANGFUSE_ENVIRONMENT
        value: production

services:
  # Backend FastAPI Service
  - type: web
    name: nexus-backend
    env: docker
    plan: free # 512MB RAM limit - optimized for spin-down (dormant mode)
    region: ohio
    dockerContext: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8000
      - fromGroup: nexus-secrets

  # Frontend Next.js Service
  - type: web
    name: nexus-frontend
    env: node
    plan: free
    region: ohio
    rootDir: frontend
    # Build and Start Commands
    buildCommand: NODE_OPTIONS="--max-old-space-size=400" npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://nexus-backend-bkne.onrender.com
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
